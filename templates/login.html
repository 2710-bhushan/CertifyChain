<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registrar Login</title>
    <!-- Fonts and Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(99, 102, 241, 0.05), transparent 60%), var(--bg-dark);">

    <div class="panel-card" style="max-width: 400px; width: 100%; box-shadow: 0 15px 30px rgba(0,0,0,0.5);">
        <div style="text-align: center;">
            <i class="bx bx-check-shield logo-icon" style="font-size: 2rem; margin-bottom: 0.75rem;"></i>
            <h2 style="font-family: 'Outfit', sans-serif; font-weight: 600; color: white;">Registrar Portal</h2>
            <span style="font-size: 0.8rem; color: var(--text-secondary);">Access certificate issuance tools</span>
        </div>

        {% if error %}
        <div style="background: var(--danger-bg); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); padding: 0.75rem; border-radius: 10px; font-size: 0.85rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="e.g. university_registrar" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                <i class="bx bx-log-in"></i> Authenticate Credentials
            </button>
        </form>

        <div style="text-align: center; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 0.5rem;">
            <a href="{{ url_for('index') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 0.25rem;">
                <i class="bx bx-arrow-back"></i> Return to Verification Console
            </a>
        </div>
    </div>

</body>
</html>
